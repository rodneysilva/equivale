services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - MongoDb__ConnectionString=mongodb://mongodb:27017
      - MongoDb__DatabaseName=equivale
      - Jwt__Secret=${JWT_SECRET:-change-this-in-production-min-32-chars!!}
      - Jwt__Issuer=equivale-api
      - Jwt__Audience=equivale-client
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
