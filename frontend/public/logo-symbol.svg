<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <rect width="48" height="48" rx="11" fill="#FEFAE0"/>
  <!-- Arco superior — seta verde sentido horário -->
  <path d="M13 24 A11 11 0 0 1 35 24" stroke="#2D6A4F" stroke-width="3" stroke-linecap="round" fill="none"/>
  <polygon points="32.5,20.5 35.5,24 30,24.3" fill="#2D6A4F"/>
  <!-- Arco inferior — seta dourada sentido horário -->
  <path d="M35 24 A11 11 0 0 1 13 24" stroke="#DDA15E" stroke-width="3" stroke-linecap="round" fill="none"/>
  <polygon points="15.5,27.5 12.5,24 18,23.7" fill="#DDA15E"/>
  <!-- Pontos centrais de troca -->
  <circle cx="20.5" cy="21.5" r="2.5" fill="#2D6A4F"/>
  <circle cx="27.5" cy="26.5" r="2.5" fill="#DDA15E"/>
</svg>
