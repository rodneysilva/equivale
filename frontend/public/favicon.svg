<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#78350f"/>
  <!-- Exchange ring: two arcs with arrows -->
  <path d="M16 5 A11 11 0 0 1 27 16" stroke="#fbbf24" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M16 27 A11 11 0 0 1 5 16" stroke="#fbbf24" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Arrow heads -->
  <path d="M24 13 L27 16 L24 19" stroke="#fbbf24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M8 19 L5 16 L8 13" stroke="#fbbf24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Equals sign (equivalence) -->
  <line x1="12" y1="14.5" x2="20" y2="14.5" stroke="#fef3c7" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="17.5" x2="20" y2="17.5" stroke="#fef3c7" stroke-width="2" stroke-linecap="round"/>
</svg>
